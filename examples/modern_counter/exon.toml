[package]
name = "modern_counter"
version = "0.1.0"
description = "Modern phenotype::ui counter example"
type = "bin"
standard = 23
build-system = "cmake"
platforms = [
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[sync]
cmake-in-root = false

[target.'cfg(os = "macos")'.build]
ldflags = [
    "-Wl,-framework,AppKit",
    "-Wl,-framework,Carbon",
    "-Wl,-framework,CoreGraphics",
    "-Wl,-framework,CoreText",
    "-Wl,-framework,Foundation",
    "-Wl,-framework,Metal",
    "-Wl,-framework,QuartzCore",
    "-Wl,-framework,Security",
    "-Wl,-framework,CoreFoundation",
]

[dependencies.path]
phenotype = "../.."
