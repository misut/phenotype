[package]
name = "file_explorer_shared"
version = "0.1.0"
description = "Shared sandboxed file explorer model for phenotype examples"
type = "lib"
standard = 23
platforms = [
    { os = "linux", arch = "x86_64" },
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[dependencies]
"github.com/misut/jsoncpp" = "0.1.4"

[dependencies.path]
phenotype_icon_contract = "../../packages/phenotype_icon_contract"
phenotype_resources = "../../packages/phenotype_resources"

[sync]
cmake-in-root = false
