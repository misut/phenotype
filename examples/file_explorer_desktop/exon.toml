[package]
name = "file_explorer_desktop"
version = "0.1.0"
description = "Finder-style desktop file explorer example"
type = "bin"
standard = 23
platforms = [
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[sync]
cmake-in-root = false

[target.'cfg(os = "macos")'.build]
ldflags = [
    "-Wl,-framework,AppKit",
    "-Wl,-framework,Carbon",
    "-Wl,-framework,CoreGraphics",
    "-Wl,-framework,CoreText",
    "-Wl,-framework,Foundation",
    "-Wl,-framework,Metal",
    "-Wl,-framework,QuartzCore",
    "-Wl,-framework,Security",
    "-Wl,-framework,CoreFoundation",
]

[dependencies]
"github.com/misut/cppx" = "1.9.0"

[dependencies.path]
file_explorer_shared = "../file_explorer_shared"
phenotype = "../.."
