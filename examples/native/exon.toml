[package]
name = "native"
version = "0.1.0"
description = "Native desktop widget showcase"
type = "bin"
standard = 23
build-system = "cmake"
platforms = [
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[sync]
cmake-in-root = false

[target.'cfg(os = "macos")'.build]
ldflags = ["-framework", "Security", "-Wl,-framework,CoreFoundation"]

[dependencies]
"github.com/misut/cppx" = "1.6.3"

[dependencies.path]
phenotype = "../.."
