[application]
id = "com.misut.phenotype.examples.file-explorer-mobile"
display_name = "Phenotype Mobile File Explorer"
version = "0.1.0"
platforms = ["macos", "windows"]
entry = "file_explorer_mobile"

[resources]
default_locale = "en"
default_font_family = "Pretendard"
artifact_manifest = "artifact_manifest.json"

[[assets]]
name = "app.icon"
source = "assets/file-explorer-icon.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = false

[[assets]]
name = "file_type.folder.icon"
source = "assets/icons/file-types/folder.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.document.icon"
source = "assets/icons/file-types/document.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.pdf.icon"
source = "assets/icons/file-types/pdf.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.text.icon"
source = "assets/icons/file-types/text.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.image.icon"
source = "assets/icons/file-types/image.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.movie.icon"
source = "assets/icons/file-types/movie.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.archive.icon"
source = "assets/icons/file-types/archive.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.audio.icon"
source = "assets/icons/file-types/audio.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.code.icon"
source = "assets/icons/file-types/code.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.spreadsheet.icon"
source = "assets/icons/file-types/spreadsheet.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "file_type.presentation.icon"
source = "assets/icons/file-types/presentation.svg"
content_type = "image/svg+xml"
preload = true
runtime_visible = true

[[assets]]
name = "license.material_symbols.icons"
source = "assets/icons/file-types/MATERIAL_SYMBOLS_LICENSE.txt"
content_type = "text/plain"
preload = false
runtime_visible = false

[[locales]]
tag = "en"
source = "locales/en.toml"
fallback = []

[[locales]]
tag = "ko"
source = "locales/ko.toml"
fallback = ["en"]

[[fonts]]
family = "Pretendard"
source = "fonts/pretendard.alias.toml"
register = false
fallback = ["system-ui", "Apple SD Gothic Neo", "Segoe UI", "Noto Sans CJK"]

[debug]
artifact_manifest = "artifact_manifest.json"
probe_scene = "mobile-file-workflow"
verifier = "phenotype artifact verify-file-explorer"
