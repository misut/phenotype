[package]
name = "phenotype-macos"
version = "0.1.0"
description = "macOS native shell for phenotype"
authors = ["misut"]
license = "MIT"
type = "lib"
standard = 23
build-system = "cmake"
platforms = [{ os = "macos", arch = "aarch64" }]

[dependencies.path]
phenotype = ".."

[dependencies.cmake.dawn]
git = "https://github.com/google/dawn.git"
tag = "v20260423.175430"
targets = "webgpu_dawn"
shallow = true

[dependencies.cmake.dawn.options]
DAWN_FETCH_DEPENDENCIES = "ON"
DAWN_BUILD_BENCHMARKS = "OFF"
DAWN_BUILD_NODE_BINDINGS = "OFF"
DAWN_BUILD_PROTOBUF = "OFF"
DAWN_BUILD_SAMPLES = "OFF"
DAWN_BUILD_TESTS = "OFF"
DAWN_ENABLE_DESKTOP_GL = "OFF"
DAWN_ENABLE_NULL = "OFF"
DAWN_ENABLE_OPENGLES = "OFF"
DAWN_ENABLE_SPIRV_VALIDATION = "OFF"
DAWN_ENABLE_VULKAN = "OFF"
DAWN_USE_GLFW = "OFF"
TINT_BUILD_CMD_TOOLS = "OFF"
TINT_BUILD_GLSL_VALIDATOR = "OFF"
TINT_BUILD_IR_BINARY = "OFF"
TINT_BUILD_TESTS = "OFF"

[target.'cfg(os = "macos")'.build]
cxxflags = ["-x", "objective-c++"]
ldflags = ["LINKER:-framework,AppKit", "LINKER:-framework,QuartzCore"]

[sync]
cmake-in-root = false
