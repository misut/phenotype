<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>phenotype — C++ UI Framework</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <noscript>JavaScript is required.</noscript>
    <script type="module">
        import { mount } from './phenotype.js';
        mount('docs.wasm').catch(e => {
            document.body.style.cssText = 'color:#c00;padding:2rem;font-family:monospace;overflow:auto';
            document.body.textContent = 'Error: ' + e.message;
        });
    </script>
</body>
</html>
