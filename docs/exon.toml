[package]
name = "docs"
version = "0.1.0"
description = "phenotype documentation site"
type = "bin"
standard = 23
platforms = [{ os = "wasi" }]

[dependencies]
# Pinned to 1.7.3 to match phenotype's transitive cppx pin. cppx 1.8.0
# unconditionally references the POSIX `winsize` / `TIOCGWINSZ` types
# in cppx.terminal.system.cppm, which fails to compile against the
# wasi-sdk libc. Bump in lockstep with phenotype/exon.toml.
"github.com/misut/cppx" = "1.7.3"

[dependencies.path]
phenotype = ".."

[sync]
cmake-in-root = false
