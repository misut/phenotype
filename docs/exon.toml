[package]
name = "docs"
version = "0.1.0"
description = "phenotype documentation site"
type = "bin"
standard = 23
platforms = [{ os = "wasi" }]

[dependencies]
# Pinned in lockstep with phenotype/exon.toml. cppx 1.9.0 added a
# `__wasi__` guard around the POSIX terminal calls in
# cppx.terminal.system.cppm so this pin no longer needs to lag.
"github.com/misut/cppx" = "1.9.0"

[dependencies.path]
phenotype = ".."

[sync]
cmake-in-root = false
