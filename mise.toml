[tools]
clang = "latest"
cmake = "latest"
"vfox:misut/mise-exon" = "0.30.0"
"vfox:misut/mise-intron" = "0.21.3"
ninja = "latest"

# Android developer workflow. Every task shells into tools/android/*.sh
# so the logic stays readable outside mise. Env fallbacks live in
# tools/android/_env.sh; override any of them locally via `.mise/config.toml`
# or plain env vars before invoking `mise run`.
#
#   mise run android            # default alias -> android:run
#   mise run android:doctor     # verify SDK / NDK / JDK / AVD setup
#   mise run android:run        # emu:start → build → apk → install → launch
#
# Individual stages (build, apk, emu:start, install, launch, logs, ...)
# are all runnable on their own.

[tasks."android"]
description = "Shortcut for android:run"
depends = ["android:run"]

[tasks."android:doctor"]
description = "Report SDK / NDK / JDK / AVD status for the Android workflow"
run = "tools/android/doctor.sh"

[tasks."android:shaders"]
description = "Recompile Android Vulkan shaders (.vert/.frag → SPIR-V .inl)"
run = "tools/compile_android_shaders.sh"

[tasks."android:build"]
description = "Cross-compile phenotype static libraries for aarch64-linux-android"
run = "mise exec -- exon build --target aarch64-linux-android"

[tasks."android:apk"]
description = "Gradle assembleDebug for examples/android"
depends = ["android:build"]
run = "tools/android/apk.sh"

[tasks."android:emu:list"]
description = "List configured AVDs and currently-online adb devices"
run = "tools/android/emu_list.sh"

[tasks."android:emu:start"]
description = "Boot $PHENOTYPE_ANDROID_AVD (or the first AVD) and wait for boot_completed"
run = "tools/android/emu_start.sh"

[tasks."android:emu:stop"]
description = "Shut down the running emulator"
run = "tools/android/emu_stop.sh"

[tasks."android:install"]
description = "adb install -r on $PHENOTYPE_ANDROID_APK"
depends = ["android:apk"]
run = "tools/android/install.sh"

[tasks."android:launch"]
description = "am start the phenotype example activity"
run = "tools/android/launch.sh"

[tasks."android:stop"]
description = "am force-stop the phenotype example"
run = "tools/android/stop.sh"

[tasks."android:logs"]
description = "adb logcat filtered to phenotype + crash categories (live tail)"
run = "tools/android/logs.sh"

[tasks."android:screencap"]
description = "Grab a PNG screenshot; opens it on macOS"
run = "tools/android/screencap.sh"

[tasks."android:run"]
description = "End-to-end: boot emu → build → apk → install → launch → log snapshot"
run = "tools/android/run.sh"

[tasks."android:clean"]
description = "gradle clean + wipe exon aarch64-linux-android output + stop emulator"
run = "tools/android/clean.sh"
