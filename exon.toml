[package]
name = "phenotype"
version = "0.10.0"
description = "C++ cross-platform UI framework with WebGPU renderer"
authors = ["misut"]
license = "MIT"
type = "lib"
standard = 23
platforms = [
    { os = "wasi" },
    { os = "macos", arch = "aarch64" },
    { os = "linux", arch = "x86_64" },
]

[dependencies]
"github.com/misut/jsoncpp" = "0.1.4"
"github.com/misut/txn" = "0.6.0"

[target.'cfg(not(os = "wasi"))'.dependencies.cmake]
dawn = { git = "https://dawn.googlesource.com/dawn", tag = "main", targets = "webgpu_dawn;webgpu_glfw;glfw", options = { DAWN_FETCH_DEPENDENCIES = "ON" } }
