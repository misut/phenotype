[package]
name = "phenotype"
version = "0.14.0"
description = "C++ cross-platform UI framework"
authors = ["misut"]
license = "MIT"
type = "lib"
standard = 23
platforms = [
    { os = "wasi" },
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
    { os = "android", arch = "aarch64" },
]

[dependencies]
"github.com/misut/jsoncpp" = "0.1.4"
"github.com/misut/cppx" = "1.9.0"
"github.com/misut/txn" = "0.7.0"

[dependencies.path]
phenotype_theme_contract = "packages/phenotype_theme_contract"
phenotype_resources = "packages/phenotype_resources"
phenotype_icon_contract = "packages/phenotype_icon_contract"
phenotype_io = "packages/phenotype_io"
phenotype_svg_contract = "packages/phenotype_svg_contract"

[target.'cfg(os = "macos")'.dependencies.path]
metal-cpp = "libs/metal-cpp"

[target.'cfg(os = "macos")'.build]
ldflags = [
    "-Wl,-framework,AppKit",
    "-Wl,-framework,CoreGraphics",
    "-Wl,-framework,CoreText",
    "-Wl,-framework,Foundation",
    "-Wl,-framework,Metal",
    "-Wl,-framework,QuartzCore",
    "-Wl,-framework,Security",
    "-Wl,-framework,CoreFoundation",
]

[target.'cfg(os = "android")'.build]
ldflags = ["-landroid", "-llog", "-lvulkan"]

[sync]
cmake-in-root = false
