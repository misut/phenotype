[package]
name = "phenotype"
version = "0.11.1"
description = "C++ cross-platform UI framework"
authors = ["misut"]
license = "MIT"
type = "lib"
standard = 23
platforms = [
    { os = "wasi" },
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[dependencies]
"github.com/misut/jsoncpp" = "0.1.4"
"github.com/misut/cppx" = "1.6.3"
"github.com/misut/txn" = "0.6.2"

[target.'cfg(not(os = "wasi"))'.dependencies.cmake.glfw]
git = "https://github.com/glfw/glfw.git"
tag = "3.4"
targets = "glfw"

[target.'cfg(not(os = "wasi"))'.dependencies.cmake.glfw.options]
GLFW_BUILD_DOCS = "OFF"
GLFW_BUILD_TESTS = "OFF"
GLFW_BUILD_EXAMPLES = "OFF"

[target.'cfg(os = "macos")'.dependencies.path]
metal-cpp = "libs/metal-cpp"

[target.'cfg(os = "macos")'.build]
ldflags = ["-framework", "Security", "-Wl,-framework,CoreFoundation"]

[sync]
cmake-in-root = false
