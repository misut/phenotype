name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: classify changes
    runs-on: ubuntu-24.04
    outputs:
      code_tests: ${{ steps.classify.outputs.code_tests }}
      docs_build: ${{ steps.classify.outputs.docs_build }}
      tools_check: ${{ steps.classify.outputs.tools_check }}
      cli_check: ${{ steps.classify.outputs.cli_check }}
      package_resource_check: ${{ steps.classify.outputs.package_resource_check }}
      file_explorer_examples: ${{ steps.classify.outputs.file_explorer_examples }}
      glass_showcase_examples: ${{ steps.classify.outputs.glass_showcase_examples }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify pull request paths
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          if git cat-file -e "${base}^{commit}" && git cat-file -e "${head}^{commit}"; then
            mapfile -t files < <(git diff --name-only "$base...$head" | sort)
          else
            mapfile -t files < <(git diff --name-only HEAD^1 HEAD | sort)
          fi

          code_tests=false
          docs_build=false
          tools_check=false
          cli_check=false
          package_resource_check=false
          file_explorer_examples=false
          glass_showcase_examples=false

          for path in "${files[@]}"; do
            case "$path" in
              .github/workflows/*)
                docs_build=true
                tools_check=true
                cli_check=true
                package_resource_check=true
                continue
                ;;
            esac

            case "$path" in
              docs/*|README.md|examples/*/README.md|tools/*/README.md)
                docs_build=true
                continue
                ;;
            esac

            case "$path" in
              tools/phenotype_cli/*)
                cli_check=true
                package_resource_check=true
                continue
                ;;
            esac

            case "$path" in
              packages/phenotype_icon_contract/*)
                cli_check=true
                continue
                ;;
            esac

            case "$path" in
              packages/phenotype_theme_contract/*)
                cli_check=true
                continue
                ;;
            esac

            case "$path" in
              packages/phenotype_io/*)
                cli_check=true
                continue
                ;;
            esac

            case "$path" in
              packages/phenotype_resources/*)
                cli_check=true
                package_resource_check=true
                continue
                ;;
            esac

            case "$path" in
              packages/phenotype_svg_contract/*)
                cli_check=true
                continue
                ;;
            esac

            case "$path" in
              tools/android/*)
                tools_check=true
                cli_check=true
                continue
                ;;
            esac

            case "$path" in
              examples/file_explorer_shared/*)
                cli_check=true
                file_explorer_examples=true
                continue
                ;;
            esac

            case "$path" in
              examples/glass_showcase_shared/*)
                cli_check=true
                glass_showcase_examples=true
                continue
                ;;
            esac

            case "$path" in
              examples/glass_showcase/*.drive)
                cli_check=true
                glass_showcase_examples=true
                continue
                ;;
            esac

            case "$path" in
              tools/*|pyproject.toml|uv.lock|.python-version)
                tools_check=true
                ;;
            esac

            case "$path" in
              examples/file_explorer_*/README.md|examples/file_explorer_*/phenotype.package.toml|examples/file_explorer_*/assets/*|examples/file_explorer_*/fonts/*|examples/file_explorer_*/locales/*)
                package_resource_check=true
                continue
                ;;
            esac

            case "$path" in
              examples/file_explorer_*/*)
                file_explorer_examples=true
                ;;
            esac

            case "$path" in
              examples/glass_showcase/*)
                glass_showcase_examples=true
                ;;
            esac

            case "$path" in
              examples/glass_showcase/artifact_manifest*.json)
                continue
                ;;
            esac

            case "$path" in
              src/*|tests/*|examples/*|exon.toml|exon.lock|mise.toml|.intron.toml)
                code_tests=true
                ;;
            esac

          done

          {
            echo "code_tests=$code_tests"
            echo "docs_build=$docs_build"
            echo "tools_check=$tools_check"
            echo "cli_check=$cli_check"
            echo "package_resource_check=$package_resource_check"
            echo "file_explorer_examples=$file_explorer_examples"
            echo "glass_showcase_examples=$glass_showcase_examples"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed files:\n'
          if ((${#files[@]} == 0)); then
            printf '  <none>\n'
          else
            printf '  %s\n' "${files[@]}"
          fi
          printf 'code_tests=%s docs_build=%s tools_check=%s cli_check=%s package_resource_check=%s file_explorer_examples=%s glass_showcase_examples=%s\n' \
            "$code_tests" "$docs_build" "$tools_check" "$cli_check" "$package_resource_check" "$file_explorer_examples" "$glass_showcase_examples"

  test:
    name: test (${{ matrix.os }}, ${{ matrix.target }})
    needs: changes
    if: needs.changes.outputs.code_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # WASM: UBSan trap mode (wasi-sdk has no ASan runtime).
          # This target has no macOS API dependency, so run it on Linux.
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
            target: wasm32-wasi
            target_arg: --target wasm32-wasi
            cxxflags: -fsanitize=undefined -fsanitize-trap=undefined -g
            ldflags: ""
          # Native: macOS is covered here. Windows native runs in the dedicated job below.
          - os: macos-15
            platform: aarch64-apple-darwin
            target: native
            target_arg: ""
            cxxflags: -fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g -O1
            ldflags: -fsanitize=address,undefined
    runs-on: ${{ matrix.os }}
    steps:
      - name: Skip code tests
        if: needs.changes.outputs.code_tests != 'true'
        shell: bash
        run: echo "No root code-test paths changed; required check passes without build."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.code_tests == 'true'

      - name: Resolve tool versions
        if: needs.changes.outputs.code_tests == 'true'
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Restore toolchains
        if: needs.changes.outputs.code_tests == 'true'
        id: toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '.intron.toml') }}

      - name: Restore build artifacts
        if: needs.changes.outputs.code_tests == 'true'
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .exon
            ~/.exon/cache
          key: build-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('mise.toml', 'exon.toml', 'exon.lock') }}
          restore-keys: |
            build-${{ matrix.os }}-${{ matrix.target }}-

      - name: Install intron
        if: needs.changes.outputs.code_tests == 'true'
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        if: needs.changes.outputs.code_tests == 'true'
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          if [[ "${{ matrix.target }}" == "wasm32-wasi" ]]; then
            intron install wasi-sdk 32
            intron install wasmtime 43.0.1
            intron default wasmtime 43.0.1
          fi

      - name: Save toolchains
        if: needs.changes.outputs.code_tests == 'true' && github.ref == 'refs/heads/main' && matrix.target == 'native' && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.intron/toolchains
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Install exon
        if: needs.changes.outputs.code_tests == 'true'
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install uv
        if: needs.changes.outputs.code_tests == 'true' && matrix.target == 'native'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true

      - name: Install Python for tools
        if: needs.changes.outputs.code_tests == 'true' && matrix.target == 'native'
        run: uv python install

      - name: Build
        if: needs.changes.outputs.code_tests == 'true'
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          exon build ${{ matrix.target_arg }}

      - name: Test
        if: needs.changes.outputs.code_tests == 'true'
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          exon test ${{ matrix.target_arg }}

      - name: Test file explorer shared module
        if: needs.changes.outputs.code_tests == 'true' && matrix.target == 'native' && needs.changes.outputs.file_explorer_examples == 'true'
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          cd examples/file_explorer_shared
          exon test

      - name: Test glass showcase shared module
        if: needs.changes.outputs.code_tests == 'true' && matrix.target == 'native' && needs.changes.outputs.glass_showcase_examples == 'true'
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          cd examples/glass_showcase_shared
          exon test

      - name: Test artifact verifier contract
        if: needs.changes.outputs.code_tests == 'true' && matrix.target == 'native'
        run: |
          uv run --frozen python tools/test_verify_artifact_bundle.py

      - name: Save build artifacts
        if: needs.changes.outputs.code_tests == 'true' && github.ref == 'refs/heads/main' && steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .exon
            ~/.exon/cache
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

  test-skip:
    name: test (${{ matrix.os }}, ${{ matrix.target }})
    needs: changes
    if: needs.changes.outputs.code_tests != 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: wasm32-wasi
          - os: macos-15
            target: native
    steps:
      - name: Skip code tests
        run: echo "No root code-test paths changed; required check passes without allocating the target runner."

  windows-native:
    name: test (windows-2022, native)
    needs: changes
    if: needs.changes.outputs.code_tests == 'true'
    runs-on: windows-2022
    steps:
      - name: Skip code tests
        if: needs.changes.outputs.code_tests != 'true'
        shell: pwsh
        run: Write-Output "No root code-test paths changed; required check passes without build."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.code_tests == 'true'

      - name: Resolve tool versions
        if: needs.changes.outputs.code_tests == 'true'
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Install intron
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path intron-*.zip -DestinationPath .
          Remove-Item intron-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.intron\bin" | Out-Null
          Move-Item -Path intron.exe -Destination "$env:USERPROFILE\.intron\bin\intron.exe"
          echo "$env:USERPROFILE\.intron\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          intron install msvc 2022
          intron default msvc 2022
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          echo "$env:USERPROFILE\.intron\toolchains\cmake\4.3.1\bin" >> $env:GITHUB_PATH
          echo "$env:USERPROFILE\.intron\toolchains\ninja\1.13.2" >> $env:GITHUB_PATH

      - name: Install exon
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path exon-*.zip -DestinationPath .
          Remove-Item exon-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.exon\bin" | Out-Null
          Move-Item -Path exon.exe -Destination "$env:USERPROFILE\.exon\bin\exon.exe"
          echo "$env:USERPROFILE\.exon\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $env:CC = "cl"
          $env:CXX = "cl"
          exon build

      - name: Test
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $env:CC = "cl"
          $env:CXX = "cl"
          exon test

      - name: Build file explorer shared module
        if: needs.changes.outputs.code_tests == 'true' && needs.changes.outputs.file_explorer_examples == 'true'
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $env:CC = "cl"
          $env:CXX = "cl"
          Set-Location examples/file_explorer_shared
          exon build

      - name: Build glass showcase shared module
        if: needs.changes.outputs.code_tests == 'true' && needs.changes.outputs.glass_showcase_examples == 'true'
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $env:CC = "cl"
          $env:CXX = "cl"
          Set-Location examples/glass_showcase_shared
          exon build

      - name: Build native example
        if: needs.changes.outputs.code_tests == 'true'
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $env:CC = "cl"
          $env:CXX = "cl"
          Set-Location examples/native
          exon build

  windows-native-skip:
    name: test (windows-2022, native)
    needs: changes
    if: needs.changes.outputs.code_tests != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Skip code tests
        run: echo "No root code-test paths changed; required check passes without allocating a Windows runner."

  cli-package:
    name: cli package checks (ubuntu-24.04)
    needs: changes
    if: needs.changes.outputs.cli_check == 'true' || needs.changes.outputs.package_resource_check == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Restore toolchains
        id: toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '.intron.toml') }}

      - name: Restore CLI build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            tools/phenotype_cli/.exon
            ~/.exon/cache
          key: cli-package-${{ runner.os }}-${{ hashFiles('mise.toml', 'tools/phenotype_cli/exon.toml', 'examples/file_explorer_shared/exon.toml', 'examples/glass_showcase_shared/exon.toml', 'packages/phenotype_icon_contract/exon.toml', 'packages/phenotype_theme_contract/exon.toml', 'packages/phenotype_io/exon.toml', 'packages/phenotype_resources/exon.toml', 'packages/phenotype_svg_contract/exon.toml') }}
          restore-keys: |
            cli-package-${{ runner.os }}-

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-linux-gnu.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2

      - name: Save toolchains
        if: github.ref == 'refs/heads/main' && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.intron/toolchains
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build phenotype CLI
        run: |
          eval "$(intron env)"
          cd tools/phenotype_cli
          exon build

      - name: Test phenotype resources package
        run: |
          eval "$(intron env)"
          cd packages/phenotype_resources
          exon test

      - name: Test phenotype icon contract package
        run: |
          eval "$(intron env)"
          cd packages/phenotype_icon_contract
          exon test

      - name: Test phenotype theme contract package
        run: |
          eval "$(intron env)"
          cd packages/phenotype_theme_contract
          exon test

      - name: Test phenotype IO contract package
        run: |
          eval "$(intron env)"
          cd packages/phenotype_io
          exon test

      - name: Build phenotype SVG contract package
        run: |
          eval "$(intron env)"
          cd packages/phenotype_svg_contract
          exon build

      - name: Test file explorer shared module
        if: needs.changes.outputs.file_explorer_examples == 'true'
        run: |
          eval "$(intron env)"
          cd examples/file_explorer_shared
          exon test

      - name: Test glass showcase shared module
        if: needs.changes.outputs.glass_showcase_examples == 'true'
        run: |
          eval "$(intron env)"
          cd examples/glass_showcase_shared
          exon test

      - name: Validate CLI JSON commands
        run: |
          set -euo pipefail
          eval "$(intron env)"
          cli="tools/phenotype_cli/.exon/debug/phenotype_cli"
          json_tool() {
            UV_PROJECT_ENVIRONMENT="$RUNNER_TEMP/phenotype-cli-json-venv" \
              uv run --frozen python -m json.tool "$@"
          }
          "$cli" doctor --json | json_tool >/dev/null
          "$cli" commands --json | json_tool >/dev/null
          "$cli" icons catalog --json | json_tool >/dev/null
          "$cli" icons sources --json | json_tool >/dev/null
          "$cli" icons file-types --json | json_tool >/dev/null
          "$cli" icons lookup recents --json | json_tool >/dev/null
          "$cli" icons lookup magnifyingglass --json | json_tool >/dev/null
          "$cli" icons svg desktopcomputer --json | json_tool >/dev/null
          "$cli" icons svg applications | grep -q '<svg '
          "$cli" icons present recents --role sidebar --selected --json | json_tool >/dev/null
          "$cli" icons render magnifyingglass --role toolbar --phase pressed --json | json_tool >/dev/null
          "$cli" svg inspect examples/file_explorer_desktop/assets/file-explorer-icon.svg --json | json_tool >/dev/null
          "$cli" theme contract --json | json_tool >/dev/null
          "$cli" io contract --json | json_tool >/dev/null
          "$cli" package list --json examples | json_tool >/dev/null
          "$cli" package inspect --json examples/file_explorer_desktop | json_tool >/dev/null
          "$cli" package inspect --json examples/file_explorer_mobile | json_tool >/dev/null
          bundle_root="$(mktemp -d)"
          "$cli" package bundle --json examples/file_explorer_desktop --output "$bundle_root/desktop" | json_tool >/dev/null
          json_tool "$bundle_root/desktop/phenotype.bundle.json" >/dev/null
          "$cli" package verify-bundle --json "$bundle_root/desktop" | json_tool >/dev/null
          test -f "$bundle_root/desktop/assets/file-explorer-icon.svg"
          test -f "$bundle_root/desktop/locales/ko.toml"
          "$cli" package bundle --json examples/file_explorer_mobile --output "$bundle_root/mobile" | json_tool >/dev/null
          json_tool "$bundle_root/mobile/phenotype.bundle.json" >/dev/null
          "$cli" package verify-bundle --json "$bundle_root/mobile" | json_tool >/dev/null
          test -f "$bundle_root/mobile/assets/file-explorer-icon.svg"
          test -f "$bundle_root/mobile/fonts/pretendard.alias.toml"
          "$cli" drive file-explorer --json --input select:README.txt --input duplicate --input delete | json_tool >/dev/null
          "$cli" drive file-explorer --json --profile mobile --scenario created-preview | json_tool >/dev/null
          "$cli" drive glass-showcase --json \
            --script examples/glass_showcase/glass_showcase.drive \
            --expect backdrop:high \
            --expect density:dense \
            --expect material-count:9 | json_tool >/dev/null
          script="$RUNNER_TEMP/file-explorer.drive"
          printf '%s\n' \
            '# deterministic CLI input script' \
            'viewport:900x620@2' \
            'file-name:CI Note' \
            'contents:Created from CI script smoke.' \
            'create-file' \
            'duplicate' \
            'delete' \
            'location:trash' \
            'sort:kind' > "$script"
          "$cli" drive file-explorer --json \
            --script "$script" \
            --package examples/file_explorer_desktop \
            --locale ko \
            --expect location:Trash \
            --expect 'entry:CI Note copy.txt' \
            --expect 'missing-entry:CI Note.txt' \
            --expect operation:file_delete:ok | json_tool >/dev/null

      - name: Save CLI build artifacts
        if: github.ref == 'refs/heads/main' && steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            tools/phenotype_cli/.exon
            ~/.exon/cache
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

  docs:
    name: docs build (wasm32-wasi)
    needs: changes
    if: needs.changes.outputs.docs_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Restore toolchains
        id: toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '.intron.toml') }}

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            docs/.exon
            ~/.exon/cache
          key: docs-${{ runner.os }}-${{ hashFiles('mise.toml', 'docs/exon.toml', 'exon.lock') }}
          restore-keys: |
            docs-${{ runner.os }}-

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-linux-gnu.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron install wasi-sdk 32
          intron install wasmtime 43.0.1
          intron default wasmtime 43.0.1

      - name: Save toolchains
        if: github.ref == 'refs/heads/main' && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.intron/toolchains
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build docs
        run: |
          eval "$(intron env)"
          cd docs
          exon build --target wasm32-wasi

      - name: Save build artifacts
        if: github.ref == 'refs/heads/main' && steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            docs/.exon
            ~/.exon/cache
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

  tooling:
    name: tooling checks
    needs: changes
    if: needs.changes.outputs.tools_check == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true

      - name: Install Python for tools
        run: uv python install

      - name: Check artifact verifier syntax
        run: |
          uv run --frozen python -m py_compile tools/verify_artifact_bundle.py

      - name: Test artifact verifier contract
        run: |
          uv run --frozen python tools/test_verify_artifact_bundle.py
