name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # WASM: UBSan trap mode (wasi-sdk has no ASan runtime).
          - os: macos-15
            platform: aarch64-apple-darwin
            target: wasm32-wasi
            target_arg: --target wasm32-wasi
            cxxflags: -fsanitize=undefined -fsanitize-trap=undefined -g
            ldflags: ""
          # Native: macOS only. Windows native is intentionally
          # un-targeted — phenotype's downstream consumers ship on
          # macOS / Android / WASM, and the MSVC C++23 modules path
          # has been a recurring CI hazard with no caller waiting on
          # the green check.
          - os: macos-15
            platform: aarch64-apple-darwin
            target: native
            target_arg: ""
            cxxflags: -fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g -O1
            ldflags: -fsanitize=address,undefined
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Restore toolchains
        id: toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '.intron.toml') }}

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .exon
            ~/.exon/cache
          key: build-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('mise.toml', 'exon.toml', 'exon.lock') }}
          restore-keys: |
            build-${{ matrix.os }}-${{ matrix.target }}-

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron install wasi-sdk 32
          intron install wasmtime 43.0.1
          intron default wasmtime 43.0.1

      - name: Save toolchains
        if: github.ref == 'refs/heads/main' && matrix.target == 'native' && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.intron/toolchains
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          exon build ${{ matrix.target_arg }}

      - name: Test
        env:
          EXON_CXXFLAGS: ${{ matrix.cxxflags }}
          EXON_LDFLAGS: ${{ matrix.ldflags }}
        run: |
          eval "$(intron env)"
          exon test ${{ matrix.target_arg }}

      - name: Save build artifacts
        if: github.ref == 'refs/heads/main' && steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .exon
            ~/.exon/cache
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
