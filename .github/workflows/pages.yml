name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "shim/**"
      - ".intron.toml"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: phenotype
    steps:
      - uses: actions/checkout@v6
        with:
          path: phenotype

      # Temporary for the M0 milestone — phenotype/exon.toml points
      # `txn` at `../txn`, so check the txn repo out as a sibling
      # directory inside the workspace. Removed in U-2 once txn 0.7.0
      # is released and phenotype switches back to a versioned dep.
      - uses: actions/checkout@v6
        with:
          repository: misut/txn
          ref: 67264b68c677ad1c8f003778922bf3a78cfb30fb
          path: txn
          fetch-depth: 0

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('phenotype/.intron.toml') }}

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-linux-gnu.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron install wasi-sdk 32

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build docs
        run: |
          eval "$(intron env)"
          cd docs
          exon build --target wasm32-wasi
          cp .exon/wasm32-wasi/debug/docs docs.wasm
          cp ../shim/phenotype.js .

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: phenotype/docs/

      - id: deployment
        uses: actions/deploy-pages@v5
