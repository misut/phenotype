name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: docs build (phenotype-cli)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: false
          github_token: ${{ github.token }}

      - name: Install mise-managed tools
        run: |
          mise install \
            "vfox:misut/mise-intron" \
            "vfox:misut/mise-exon" \
            "vfox:misut/mise-phenotype"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          mise exec -- intron install llvm 22.1.2
          mise exec -- intron install cmake 4.3.1
          mise exec -- intron install ninja 1.13.2
          mise exec -- intron install wasi-sdk 32
          mise exec -- intron install wasmtime 43.0.1
          mise exec -- intron default wasmtime 43.0.1

      - name: Build docs with phenotype-cli
        run: |
          eval "$(mise exec -- intron env)"
          mise exec -- phenotype-cli build --release --out-dir .phenotype/pages

      - name: Smoke test staged docs
        run: |
          eval "$(mise exec -- intron env)"
          mise exec -- phenotype-cli test --release --no-build --out-dir .phenotype/pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .phenotype/pages

  deploy:
    name: docs deploy
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
