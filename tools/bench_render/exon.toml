[package]
name = "bench_render"
version = "0.1.0"
description = "phenotype render pipeline micro-benchmark (host-only)"
type = "bin"
standard = 23
platforms = [
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[dependencies]
"github.com/misut/cppx" = "1.7.3"

[dependencies.path]
phenotype = "../.."

[sync]
cmake-in-root = false
