[package]
name = "phenotype_cli"
version = "0.1.0"
description = "Host CLI for phenotype packaging, diagnostics, and artifact inspection"
type = "bin"
standard = 23
platforms = [
    { os = "linux", arch = "x86_64" },
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[dependencies]
"github.com/misut/cppx" = "1.13.0"
"github.com/misut/jsoncpp" = "0.1.4"

[dependencies.path]
file_explorer_shared = "../../examples/file_explorer_shared"
glass_showcase_shared = "../../examples/glass_showcase_shared"
phenotype_icon_contract = "../../packages/phenotype_icon_contract"
phenotype_io = "../../packages/phenotype_io"
phenotype_resources = "../../packages/phenotype_resources"

[sync]
cmake-in-root = false
