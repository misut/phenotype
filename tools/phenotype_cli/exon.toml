[package]
name = "phenotype_cli"
version = "0.1.0"
description = "Host CLI for phenotype packaging, diagnostics, and artifact inspection"
type = "bin"
standard = 23
platforms = [
    { os = "linux", arch = "x86_64" },
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
]

[dependencies]
"github.com/misut/cppx" = "1.13.0"

[dependencies.path]
phenotype_resources = "../../packages/phenotype_resources"

[sync]
cmake-in-root = false
